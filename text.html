<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Dorian Gray Text</title>

<script src="js/script.js" defer></script>
<style>

simile{
    border-bottom:3px solid #2a6df4;
    cursor:pointer;
}

metaphor{
    background-color:#ffd6d6;
    padding:2px 3px;
    border-radius:3px;
    cursor:pointer;
}

simile:hover{
    background-color:#e6f0ff;
}

metaphor:hover{
    background-color:#ffb3b3;
}
#analysis-panel{
    background:#f7f7f7;
    border:1px solid #ddd;
    padding:15px;
    margin-bottom:20px;
}

#figure-search{
    width:100%;
    padding:8px;
    margin-bottom:10px;
    font-size:16px;
}

#search-results{
    max-height:300px;
    overflow-y:auto;
}

#search-results li{
    cursor:pointer;
    margin-bottom:6px;
}

#search-results li:hover{
    text-decoration:underline;
}
    
</style>

</head>

<body>

<h1>The Picture of Dorian Gray</h1>
<div id="analysis-panel">

<input
type="text"
id="figure-search"
placeholder="Search figurative language...">

<ul id="search-results"></ul>

</div>

<div id="novel-text">
Loading text...
</div>

</body>

</html>
